name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2
          cache-read-only: ${{ github.event_name == 'pull_request' }}

      - name: Build with Gradle
        run: gradle assembleRelease --no-daemon

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/camera-allow-in-lockscreen.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: camera-allow-in-lockscreen
          path: app/build/outputs/apk/release/camera-allow-in-lockscreen.apk
          if-no-files-found: error
